spring.application.name=property-service
server.port=8081

# Actuator - expose all required endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus,loggers
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true

# Tracing
management.tracing.sampling.probability=1.0
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# HTTP metrics
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.enable.http.server.requests=true
management.info.env.enabled=true
# Info endpoint metadata
info.app.name=Domexa Property Service
info.app.version=1.0.0
info.app.description=Manages rental property listings
info.app.team=Team #01

# Logging with trace/span IDs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]